<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiyetTakibim | Profesyonel Yönetim</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f766e">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
    
    <style>
        .hide-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .hide-scroll::-webkit-scrollbar-track { background: #f1f5f9; }
        .hide-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .tab-btn.active { color: #0f766e; border-bottom: 3px solid #0f766e; font-weight: 800; background: #f0fdfa; }
        .form-input { width: 100%; padding: 0.6rem 1rem; border: 1px solid #e2e8f0; border-radius: 0.5rem; outline: none; transition: all 0.2s; font-size: 0.875rem; color: #334155; background: #fff; }
        .form-input:focus { border-color: #0f766e; box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.1); }
        .form-label { display: block; font-size: 0.75rem; font-weight: 700; color: #475569; margin-bottom: 0.3rem; }
        .menu-btn.active { background-color: #f0fdfa; color: #0f766e; font-weight: 700; border-right: 3px solid #0f766e;}
        .fc { background: #fff; border-radius: 12px; overflow: hidden; font-family: inherit; }
        .fc-theme-standard td, .fc-theme-standard th, .fc-theme-standard .fc-scrollgrid { border-color: #f1f5f9; }
        .fc-header-toolbar { padding: 20px; background: #f8fafc; margin-bottom: 0 !important; border-bottom: 1px solid #e2e8f0; }
        .fc-toolbar-title { font-weight: 900 !important; font-size: 1.2rem !important; color: #0f766e; }
        .fc-button-primary { background-color: #0f766e !important; border: none !important; border-radius: 8px !important; text-transform: capitalize; font-weight: bold !important; padding: 8px 16px !important; transition: all 0.2s; }
    </style>
</head>

<body class="bg-slate-50 text-slate-800 font-sans h-screen flex overflow-hidden">

    <aside class="w-64 bg-white border-r border-gray-200 flex flex-col shrink-0 z-20 shadow-sm">
        <div class="h-16 flex items-center px-6 border-b border-gray-200">
            <i class="fas fa-leaf text-teal-600 text-xl mr-2"></i>
            <h1 class="text-xl font-black tracking-tight text-slate-800">DiyetTakibim</h1>
        </div>
        <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1 hide-scroll">
            <div class="text-[10px] font-black text-slate-400 tracking-widest px-3 mb-2 mt-2 uppercase">Yönetim Paneli</div>
            <button onclick="window.switchPage('page-dashboard')" id="nav-dashboard" class="menu-btn active w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-500 hover:bg-slate-50 font-medium text-sm transition"><i class="fas fa-home w-5"></i> Özet Panel</button>
            <button onclick="window.switchPage('page-randevular')" id="nav-randevular" class="menu-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-500 hover:bg-slate-50 font-medium text-sm transition"><i class="far fa-calendar-alt w-5"></i> Randevular</button>
            <button onclick="window.switchPage('page-finans')" id="nav-finans" class="menu-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-500 hover:bg-slate-50 font-medium text-sm transition"><i class="fas fa-wallet w-5"></i> Kasa / Finans</button>
            <button onclick="window.switchPage('page-sablonlar')" id="nav-sablonlar" class="menu-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-500 hover:bg-slate-50 font-medium text-sm transition"><i class="fas fa-file-alt w-5"></i> Hazır Şablonlar</button>
            
            <div class="text-[10px] font-black text-slate-400 tracking-widest px-3 mb-2 mt-4 uppercase">Danışan İşlemleri</div>
            <button onclick="window.switchPage('page-danisan-listesi')" id="nav-danisan-listesi" class="menu-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-500 hover:bg-slate-50 font-medium text-sm transition"><i class="fas fa-users w-5"></i> Danışan Listesi</button>
            <button onclick="window.switchPage('page-yeni-kayit')" id="nav-yeni-kayit" class="menu-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-500 hover:bg-slate-50 font-medium text-sm transition"><i class="fas fa-user-plus w-5"></i> Danışan Ekle</button>
        </nav>
    </aside>

    <div class="flex-1 flex flex-col h-full relative">
        <header class="bg-white border-b border-gray-200 h-16 flex items-center justify-between px-8 shrink-0">
            <h2 id="header-title" class="text-lg font-bold text-slate-800">Özet Panel</h2>
            <div class="flex items-center gap-3">
                <button onclick="window.openModal('modal-finans')" class="bg-teal-50 text-teal-700 border border-teal-200 px-4 py-2 rounded-lg font-bold text-xs hover:bg-teal-100 transition"><i class="fas fa-lira-sign mr-1"></i> Tahsilat Gir</button>
                <div class="w-8 h-8 rounded-full bg-teal-100 text-teal-700 flex items-center justify-center font-bold text-sm border border-teal-200">B</div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-6 md:p-8 bg-slate-50 hide-scroll relative">

            <div id="page-dashboard" class="page-section block max-w-6xl mx-auto space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm flex items-center justify-between"><div><p class="text-xs text-slate-500 font-bold uppercase tracking-widest mb-1">Toplam Danışan</p><h3 class="text-3xl font-black text-slate-800" id="stat-hastalar">0</h3></div><div class="w-12 h-12 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center text-xl"><i class="fas fa-users"></i></div></div>
                    <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm flex items-center justify-between"><div><p class="text-xs text-slate-500 font-bold uppercase tracking-widest mb-1">Randevular</p><h3 class="text-3xl font-black text-slate-800" id="stat-randevular">0</h3></div><div class="w-12 h-12 rounded-full bg-orange-50 text-orange-500 flex items-center justify-center text-xl"><i class="far fa-calendar-check"></i></div></div>
                    <div class="bg-white p-6 rounded-xl border border-teal-200 shadow-sm flex items-center justify-between"><div><p class="text-xs text-teal-700 font-bold uppercase tracking-widest mb-1">Toplam Bakiye (Kasa)</p><h3 class="text-3xl font-black text-teal-700" id="stat-kasa">0 ₺</h3></div><div class="w-12 h-12 rounded-full bg-teal-50 text-teal-600 flex items-center justify-center text-xl"><i class="fas fa-lira-sign"></i></div></div>
                </div>
            </div>

            <div id="page-yeni-kayit" class="page-section hidden max-w-5xl mx-auto bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <form id="form-danisan-kayit">
                    <div class="flex overflow-x-auto border-b border-gray-200 hide-scroll bg-slate-50/50">
                        <button type="button" onclick="window.switchFormTab('bilgiler')" id="btn-ftab-bilgiler" class="tab-btn active px-6 py-4 text-sm font-bold text-slate-600 border-b-2 border-teal-700 whitespace-nowrap">Kişisel Bilgiler</button>
                        <button type="button" onclick="window.switchFormTab('ek')" id="btn-ftab-ek" class="tab-btn px-6 py-4 text-sm font-bold text-slate-600 border-b-2 whitespace-nowrap">Tıbbi Durum</button>
                        <button type="button" onclick="window.switchFormTab('yasam')" id="btn-ftab-yasam" class="tab-btn px-6 py-4 text-sm font-bold text-slate-600 border-b-2 whitespace-nowrap">Yaşam Tarzı & Alışkanlıklar</button>
                        <button type="button" onclick="window.switchFormTab('notlar')" id="btn-ftab-notlar" class="tab-btn px-6 py-4 text-sm font-bold text-slate-600 border-b-2 whitespace-nowrap">Özel Notlar</button>
                    </div>
                    
                    <div id="ftab-bilgiler" class="p-8 space-y-6 block">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div><label class="form-label">Adı*</label><input type="text" id="d-ad" required class="form-input" placeholder="Adı"></div>
                            <div><label class="form-label">Soyadı*</label><input type="text" id="d-soyad" required class="form-input" placeholder="Soyadı"></div>
                            <div><label class="form-label">Cep Telefonu</label><input type="tel" id="d-tel" class="form-input" placeholder="05XX XXX XX XX"></div>
                            
                            <div><label class="form-label">Doğum Tarihi</label><input type="date" id="d-dogum-tarihi" class="form-input"></div>
                            <div><label class="form-label">Cinsiyet</label><select id="d-cinsiyet" class="form-input"><option>Belirtilmemiş</option><option>Kadın</option><option>Erkek</option></select></div>
                            <div><label class="form-label">Kan Grubu</label><select id="d-kan-grubu" class="form-input"><option>Bilinmiyor</option><option>A Rh+</option><option>A Rh-</option><option>B Rh+</option><option>B Rh-</option><option>AB Rh+</option><option>AB Rh-</option><option>0 Rh+</option><option>0 Rh-</option></select></div>
                            
                            <div><label class="form-label">Meslek</label><input type="text" id="d-meslek" class="form-input" placeholder="Örn: Öğretmen"></div>
                            <div><label class="form-label">Medeni Hal</label><select id="d-medeni-hal" class="form-input"><option>Belirtilmemiş</option><option>Bekar</option><option>Evli</option></select></div>
                            <div><label class="form-label">Referans Kaynağı</label><select id="d-referans" class="form-input"><option>Instagram</option><option>Google</option><option>Tavsiye</option><option>Diğer</option></select></div>
                            
                            <div class="col-span-1 md:col-span-2"><label class="form-label">Açık Adres (Opsiyonel)</label><input type="text" id="d-adres" class="form-input" placeholder="Ev veya iş adresi..."></div>
                            <div><label class="form-label">Acil Durumda Ulaşılacak Kişi</label><input type="text" id="d-acil-kisi" class="form-input" placeholder="İsim ve Telefon"></div>
                            
                            <div><label class="form-label">Protokol No</label><div class="flex"><input type="text" id="d-protokol" readonly class="form-input rounded-r-none bg-slate-50 font-bold"><button type="button" onclick="window.uretProtokol()" class="px-4 bg-white border border-gray-300 border-l-0 rounded-r-md text-xs font-semibold text-slate-600">Üret</button></div></div>
                            <div class="col-span-1 md:col-span-2 flex items-center gap-2 mt-4"><input type="checkbox" id="d-kvkk" class="w-4 h-4 text-teal-600"><label class="text-sm font-bold text-slate-600">KVKK ve Aydınlatma Metnini Onayladı</label></div>
                        </div>
                    </div>
                    
                    <div id="ftab-ek" class="hidden p-8 space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                            <div><label class="form-label text-teal-600">Başlangıç Kilosu (kg)</label><input type="number" step="0.1" id="d-guncel-kilo" class="form-input border-teal-200 bg-teal-50 font-bold text-teal-700"></div>
                            <div><label class="form-label">Boy (cm)</label><input type="number" id="d-boy" class="form-input"></div>
                            <div><label class="form-label text-orange-600">Hedef Kilo (kg)</label><input type="number" step="0.1" id="d-hedef" class="form-input"></div>
                        </div>
                        <hr class="my-4 border-gray-200">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div><label class="form-label text-red-500"><i class="fas fa-exclamation-circle mr-1"></i> Gıda/İlaç Alerjileri</label><input type="text" id="d-alerjiler" class="form-input" placeholder="Örn: Laktoz, Glüten, Penisilin"></div>
                            <div><label class="form-label text-red-500"><i class="fas fa-heartbeat mr-1"></i> Kronik Hastalıklar</label><input type="text" id="d-kronik" class="form-input" placeholder="Örn: İnsülin Direnci, Haşimato"></div>
                            <div><label class="form-label text-slate-700"><i class="fas fa-pills mr-1"></i> Sürekli Kullanılan İlaçlar</label><input type="text" id="d-ilaclar" class="form-input" placeholder="Örn: Euthyrox 50mg"></div>
                            <div><label class="form-label text-slate-700"><i class="fas fa-procedures mr-1"></i> Geçirilen Ameliyatlar</label><input type="text" id="d-ameliyatlar" class="form-input" placeholder="Örn: Safra kesesi, Mide küçültme"></div>
                        </div>
                    </div>

                    <div id="ftab-yasam" class="hidden p-8 space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div><label class="form-label text-blue-500"><i class="fas fa-tint mr-1"></i> Günlük Su Tüketimi (Litre)</label><input type="number" step="0.1" id="d-su" class="form-input" placeholder="Örn: 2.5"></div>
                            <div><label class="form-label text-orange-500"><i class="fas fa-running mr-1"></i> Fiziksel Aktivite Durumu</label><select id="d-aktivite" class="form-input"><option>Hareketsiz (Masa başı)</option><option>Hafif Tempolu (Ara sıra yürüyüş)</option><option>Aktif Sporcu (Düzenli spor)</option></select></div>
                            <div><label class="form-label text-slate-700"><i class="fas fa-smoking mr-1"></i> Sigara / Alkol Kullanımı</label><select id="d-sigara" class="form-input"><option>Kullanmıyor</option><option>Sadece Sigara</option><option>Sadece Alkol</option><option>Her İkisi de Var</option></select></div>
                            <div><label class="form-label text-purple-600"><i class="fas fa-moon mr-1"></i> Uyku Düzeni</label><select id="d-uyku" class="form-input"><option>Düzenli (Günde 7-8 saat)</option><option>Düzensiz</option><option>İnsomnia (Uyku zorluğu)</option></select></div>
                            <div class="col-span-1 md:col-span-2"><label class="form-label text-amber-700"><i class="fas fa-poop mr-1"></i> Bağırsak Düzeni</label><select id="d-bagirsak" class="form-input"><option>Her gün düzenli</option><option>2-3 günde bir</option><option>Kronik Kabızlık</option><option>İshal Eğilimi</option></select></div>
                        </div>
                    </div>

                    <div id="ftab-notlar" class="hidden p-8">
                        <label class="form-label">Danışan Hakkında Özel Notlar</label>
                        <textarea id="d-notlar" rows="5" class="form-input" placeholder="Sevdiği/sevmediği yemekler, özel istekleri vb..."></textarea>
                    </div>
                    
                    <div class="p-6 border-t border-gray-200 bg-slate-50 flex justify-end">
                        <button type="submit" id="btn-kaydet" class="px-8 py-3 bg-teal-700 text-white rounded-lg font-bold shadow-lg hover:bg-teal-800 transition">Danışanı Sisteme Kaydet</button>
                    </div>
                </form>
            </div>
            
            <div id="page-danisan-listesi" class="page-section hidden max-w-6xl mx-auto space-y-4">
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 flex justify-between items-center"><h2 class="text-xl font-bold text-slate-800">Danışan Portföyü</h2><button onclick="window.switchPage('page-yeni-kayit')" class="bg-teal-600 text-white px-5 py-2.5 rounded-lg text-sm font-semibold hover:bg-teal-700"><i class="fas fa-plus mr-2"></i> Yeni Ekle</button></div>
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden"><table class="w-full text-left border-collapse"><thead><tr class="bg-slate-50 border-b border-gray-200 text-[11px] text-slate-500 uppercase font-bold"><th class="py-4 px-6 w-16">#</th><th class="py-4 px-6">AD SOYAD / PROTOKOL</th><th class="py-4 px-6">TELEFON</th><th class="py-4 px-6 text-right">İŞLEM</th></tr></thead><tbody id="danisan-tablosu" class="text-sm font-medium text-slate-700 divide-y divide-gray-100"></tbody></table></div>
            </div>

            </main>
    </div>

    <div id="toast-container"></div>
    
    <script src="ui.js?v=9002"></script>
    <script type="module" src="app.js?v=9002"></script>
    
    <script>
        if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(err => console.log(err)); }); }
        
        // Form Sekmesi Değiştirici (UI Tarafı İçin)
        window.switchFormTab = function(tabName) {
            const tabs = ['bilgiler', 'ek', 'yasam', 'notlar'];
            tabs.forEach(t => {
                const btn = document.getElementById('btn-ftab-' + t);
                const content = document.getElementById('ftab-' + t);
                if(btn && content) {
                    if(t === tabName) {
                        btn.classList.add('active', 'border-teal-700', 'text-slate-800');
                        content.classList.remove('hidden'); content.classList.add('block');
                    } else {
                        btn.classList.remove('active', 'border-teal-700', 'text-slate-800');
                        content.classList.remove('block'); content.classList.add('hidden');
                    }
                }
            });
        }
    </script>
</body>
</html>
